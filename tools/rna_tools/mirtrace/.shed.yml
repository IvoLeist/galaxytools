name: mirtrace
owner: iuc
description: >
  miRTrace is a tool for quality control and tracing of small RNA sequencing data.
  It profiles sequencing quality, read length, sequencing depth and miRNA complexity,
  the amounts of miRNAs versus undesirable sequences (derived from tRNAs, rRNAs and
  sequencing artifacts) and the composition of clade-specific miRNAs.
homepage_url: https://github.com/friedlanderlab/mirtrace
long_description: >
  miRTrace is a quality control and contamination-tracing tool developed specifically
  for small RNA sequencing data. It contains two modes:

  QC mode: produces a full set of quality control reports including PHRED score
  distribution, read length distribution, QC status, RNA type classification, miRNA
  complexity and clade-specific miRNA profiles.

  Trace mode: produces a clade-specific miRNA profile to detect cross-species
  contamination. Unlike QC mode, no species argument is required.
remote_repository_url: https://github.com/bgruening/galaxytools/tree/master/tools/rna_tools/mirtrace
type: unrestricted
categories:
  - Transcriptomics
auto_tool_repositories:
  name_template: "{{ tool_id }}"
  description_template: "Wrapper for {{ tool_name }}."
suite:
  name: "suite_mirtrace"
  description: "A suite of Galaxy tools designed to work with the small RNA-seq data"
  type: repository_suite_definition
